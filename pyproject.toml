[tool.poetry]
name = "sermon-archive"
version = "0.1.0"
description = "Sermon Archive API backend"
readme = "README.md"
package-mode = false
packages = [{ include = "sermon_site" }]

[tool.poetry.dependencies]
python = "^3.11"
Django = "^5.0"
django-axes = "^6.5"
python-dotenv = "^1.0"
gunicorn = "^23.0"
mysqlclient = "^2.2.7"
djangorestframework = "^3.15.2"
django-cors-headers = "^4.9.0"
drf-spectacular = "^0.29.0"
markdown2 = "^2.5.4"
pytest = "^9.0.2"

[tool.poetry.group.dev.dependencies]
ipython = "^8.26"
django-stubs = "^5.2.8"
django-stubs-ext = "^5.2.8"
mypy = "^1.19.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.mypy]
python_version = "3.11"
plugins = ["mypy_django_plugin.main"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["apps.sermons.tests.*"]
ignore_errors = true

[tool.django-stubs]
django_settings_module = "config.settings"
