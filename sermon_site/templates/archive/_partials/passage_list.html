<div id="passage-list" class="list">
  <ul class="bullet-list">
    {% with ps=passages|default:sermon.passages.all %}
    {% for p in ps %}
      <li>
        {{ p.ref_display }}
        {% if p.context_note %} ({{ p.context_note }}){% endif %}
        <button class="btn btn-ghost btn-danger"
          hx-get='{% url "passage_delete" sermon.pk p.ord %}'
          hx-target='#passage-list'
          hx-swap='outerHTML'
          hx-confirm='Delete this passage?'>
          Delete
        </button>
      </li>
    {% empty %}
      <li class="empty">No passages yet.</li>
    {% endfor %}
    {% endwith %}
  </ul>
</div>
