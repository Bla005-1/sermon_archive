components:
  schemas:
    Attachment:
      type: object
      properties:
        attachment_id:
          type: integer
          readOnly: true
        sermon:
          type: integer
          readOnly: true
        rel_path:
          type: string
          readOnly: true
        original_filename:
          type: string
          nullable: true
          maxLength: 255
        mime_type:
          type: string
          nullable: true
          maxLength: 255
        byte_size:
          type: integer
          maximum: 18446744073709551615
          minimum: 0
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - attachment_id
      - created_at
      - rel_path
      - sermon
    BibleBook:
      type: object
      properties:
        book_id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 64
        order_num:
          type: integer
          maximum: 4294967295
          minimum: 0
          format: int64
        testament:
          $ref: '#/components/schemas/TestamentEnum'
      required:
      - book_id
      - name
      - order_num
      - testament
    BibleVerse:
      type: object
      properties:
        verse_id:
          type: integer
          readOnly: true
        book:
          allOf:
          - $ref: '#/components/schemas/BibleBook'
          readOnly: true
        chapter:
          type: integer
          maximum: 65535
          minimum: 0
        verse:
          type: integer
          maximum: 65535
          minimum: 0
      required:
      - book
      - chapter
      - verse
      - verse_id
    BibleWidget:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        start_verse:
          allOf:
          - $ref: '#/components/schemas/BibleVerse'
          readOnly: true
        end_verse:
          allOf:
          - $ref: '#/components/schemas/BibleVerse'
          readOnly: true
        start_verse_id:
          type: integer
          writeOnly: true
        end_verse_id:
          type: integer
          writeOnly: true
        translation:
          type: string
          maxLength: 16
        ref:
          type: string
          maxLength: 64
        display_text:
          type: string
        weight:
          type: integer
          maximum: 65535
          minimum: 0
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - created_at
      - display_text
      - end_verse
      - end_verse_id
      - id
      - ref
      - start_verse
      - start_verse_id
      - translation
      - updated_at
    CommentaryEnd:
      type: object
      properties:
        book:
          type: string
        chapter:
          type: integer
        verse:
          type: integer
      required:
      - book
      - chapter
      - verse
