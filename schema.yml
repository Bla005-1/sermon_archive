  /api/verses/:
    get:
      operationId: verses_retrieve
      description: Retrieve a passage with verse text, notes, and available translations.
        If the provided query is not a Bible reference, a lightweight intent payload
        is returned instead of performing any lookup.
      parameters:
      - in: query
        name: query
        schema:
          type: string
        description: Bible reference such as "John 3:16-18" or "Psalm 23". Also accepts
          "ref" for backwards compatibility.
        required: true
      - in: query
        name: translation
        schema:
          type: string
        description: Preferred translation code (e.g., ESV, NIV). Defaults to ESV.
      tags:
      - verses
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerseIntentResponse'
          description: ''
        '400':
          description: Missing reference.
  /api/verses/commentaries/:
    get:
      operationId: verses_commentaries_retrieve
