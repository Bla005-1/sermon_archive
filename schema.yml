  /api/search/:
    get:
      operationId: search_retrieve
      description: Full-text Bible verse search with pagination and optional filters.
      parameters:
      - in: query
        name: book
        schema:
          type: string
        description: Restrict results to a specific Bible book.
      - in: query
        name: chapter
        schema:
          type: integer
        description: Restrict results to a specific chapter within the selected book.
      - in: query
        name: exact
        schema:
          type: boolean
        description: If true, only return verses containing the exact query string.
      - in: query
        name: page
        schema:
          type: integer
        description: Result page to return (1-indexed).
      - in: query
        name: q
        schema:
          type: string
        description: Free-text query to search for within verse text.
        required: true
      - in: query
        name: testament
        schema:
          type: string
        description: Restrict results to OT or NT.
      - in: query
        name: translation
        schema:
          type: string
        description: Translation code to search within (defaults to ESV).
      tags:
      - search
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerseSearchResponse'
          description: ''
        '400':
          description: Missing or invalid query.
  /api/search/ref/:
    get:
      operationId: search_ref_retrieve
